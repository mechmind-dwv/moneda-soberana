<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monedero Soberano</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    h2 { margin: 0 0 10px; }
    label { display: block; margin: 10px 0 5px; }
    input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; margin-bottom: 10px; }
    .secondary { background: #2196F3; }
    .error { color: darkred; background: #fdd; padding: 15px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>🏛️ Monedero Soberano</h1>
  <div class="card">
    <p><strong>Mi saldo:</strong> <span id="balance">0</span> SOBER</p>
    <p><strong>Límite de crédito:</strong> <span id="limit">0</span> SOBER</p>
  </div>
  <div>
    <label>Dirección destino</label>
    <input id="to" placeholder="0x...">
    <label>Cantidad (SOBER)</label>
    <input id="amount" type="number" step="0.01" placeholder="10">
    <button onclick="send()">Enviar</button>
    <button class="secondary" onclick="refresh()">Actualizar saldo</button>
  </div>
  <div id="error" class="error" style="display:none;"></div>
  <script>
    const provider = new ethers.JsonRpcProvider("http://127.0.0.1:8545");
    const privateKey = "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80";
    const wallet = new ethers.Wallet(privateKey, provider);
    const userAddress = wallet.address;
    const contractAddress = "0x5FbDB2315678afecb367f032d93F642f64180aa3";
    const abi = [
      "function transfer(address to, uint256 amount) external",
      "function balance(address) view returns (int256)",
      "function getEffectiveCreditLimit(address) view returns (uint256)"
    ];
    const contract = new ethers.Contract(contractAddress, abi, wallet);
    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.style.display = "block";
    }
    function hideError() { document.getElementById("error").style.display = "none"; }
    async function refresh() {
      try {
        hideError();
        const bal = await contract.balance(userAddress);
        const lim = await contract.getEffectiveCreditLimit(userAddress);
        document.getElementById("balance").textContent = ethers.formatEther(bal);
        document.getElementById("limit").textContent = ethers.formatEther(lim);
      } catch(e) { showError(e.reason || e.message || "Error al refrescar"); }
    }
    async function send() {
      const to = document.getElementById("to").value;
      const amount = document.getElementById("amount").value;
      if (!to || !amount) { showError("Completa todos los campos"); return; }
      try {
        hideError();
        const tx = await contract.transfer(to, ethers.parseEther(amount));
        await tx.wait();
        alert("Transferencia de " + amount + " SOBER enviada a " + to);
        refresh();
        document.getElementById("to").value = "";
        document.getElementById("amount").value = "";
      } catch(e) { showError(e.reason || e.message || "Error en la transferencia"); }
    }
    refresh();
  </script>
</body>
</html>
